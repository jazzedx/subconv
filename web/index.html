<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubConv 订阅转换</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root { --bg: #f5f7fa; --card: #fff; --accent: #4f46e5; --accent-h: #4338ca; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.navbar { background: linear-gradient(135deg, var(--accent), #7c3aed) !important; }
.card { border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.card-header { background: var(--card); border-bottom: 1px solid var(--border); border-radius: 12px 12px 0 0 !important; font-weight: 600; }
.sub-url-box { background: #f0fdf4; border: 2px dashed #86efac; border-radius: 10px; padding: 16px; cursor: pointer; transition: all .2s; }
.sub-url-box:hover { border-color: #22c55e; background: #dcfce7; }
.sub-url-box code { font-size: 0.95rem; color: #166534; word-break: break-all; }
.badge-protocol { font-size: 0.75rem; }
.log-box { background: #1e293b; color: #e2e8f0; border-radius: 8px; padding: 12px; font-family: "Cascadia Code", "Fira Code", monospace; font-size: 0.8rem; max-height: 240px; overflow-y: auto; }
.log-box .log-time { color: #94a3b8; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.status-dot.ok { background: #22c55e; }
.status-dot.updating { background: #f59e0b; animation: pulse 1s infinite; }
.login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.node-table { font-size: 0.85rem; }
.node-table th { position: sticky; top: 0; background: var(--card); z-index: 1; }
.table-container { max-height: 400px; overflow-y: auto; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
.btn-accent { background: var(--accent); color: #fff; border: none; }
.btn-accent:hover { background: var(--accent-h); color: #fff; }
.copy-toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
</style>
</head>
<body>

<nav class="navbar navbar-dark py-3">
  <div class="container">
    <span class="navbar-brand fw-bold">🔗 SubConv 订阅转换</span>
    <div class="d-flex align-items-center gap-3">
      <span id="statusBadge" class="badge bg-light text-dark">
        <span class="status-dot ok" id="statusDot"></span>
        <span id="statusText">就绪</span>
      </span>
      <button class="btn btn-sm btn-outline-light" onclick="logout()">退出</button>
    </div>
  </div>
</nav>

<!-- Login Overlay -->
<div id="loginOverlay" class="login-overlay" style="display:none">
  <div class="card p-4" style="width: 380px;">
    <h5 class="mb-3">🔑 输入API密钥</h5>
    <input type="password" id="apiKeyInput" class="form-control mb-3" placeholder="API密钥" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-accent w-100" onclick="doLogin()">登录</button>
    <small class="text-muted mt-2 d-block">密钥在首次运行时显示在控制台</small>
  </div>
</div>

<!-- Toast -->
<div id="copyToast" class="copy-toast" style="display:none">
  <div class="alert alert-success py-2 px-3 mb-0 shadow">✅ 已复制到剪贴板</div>
</div>

<div class="container py-4" id="mainContent" style="display:none">

  <!-- 订阅地址 -->
  <div class="card mb-4">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span>📋 订阅地址</span>
      <small class="text-muted">点击复制，粘贴到 Clash Verge 远程订阅</small>
    </div>
    <div class="card-body">
      <div class="sub-url-box" onclick="copySubURL()">
        <code id="subURL">加载中...</code>
      </div>
      <div class="mt-2 d-flex gap-2 align-items-center">
        <small class="text-muted" id="subInfo"></small>
      </div>
      <div class="mt-2 d-flex gap-2 align-items-center">
        <label class="form-label mb-0 small text-muted">配置名称:</label>
        <input type="text" id="configNameInput" class="form-control form-control-sm" style="max-width:200px" placeholder="SubConv">
        <button class="btn btn-sm btn-outline-primary" onclick="saveConfigName()">保存</button>
        <small class="text-muted">Clash Verge 显示的配置名</small>
      </div>
    </div>
  </div>

  <!-- 状态栏 -->
  <div class="row mb-4 g-3">
    <div class="col-md-3 col-6">
      <div class="card text-center p-3">
        <div class="text-muted small">节点数量</div>
        <div class="fs-3 fw-bold text-primary" id="nodeCount">0</div>
      </div>
    </div>
    <div class="col-md-3 col-6">
      <div class="card text-center p-3">
        <div class="text-muted small">订阅数量</div>
        <div class="fs-3 fw-bold text-success" id="subCount">0</div>
      </div>
    </div>
    <div class="col-md-3 col-6">
      <div class="card text-center p-3">
        <div class="text-muted small">上次更新</div>
        <div class="fs-6 fw-bold" id="lastUpdate">-</div>
      </div>
    </div>
    <div class="col-md-3 col-6">
      <div class="card text-center p-3">
        <div class="text-muted small">下次更新</div>
        <div class="fs-6 fw-bold" id="nextUpdate">-</div>
      </div>
    </div>
  </div>

  <!-- 订阅管理 -->
  <div class="card mb-4">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span>📡 订阅管理</span>
      <button class="btn btn-sm btn-accent" onclick="refreshAll()" id="refreshBtn">
        🔄 全部刷新
      </button>
    </div>
    <div class="card-body">
      <div class="input-group mb-3">
        <input type="text" id="newSubName" class="form-control" placeholder="名称（可选）" style="max-width:160px">
        <input type="text" id="newSubURL" class="form-control" placeholder="订阅地址 https://...">
        <button class="btn btn-accent" onclick="addSub()">添加</button>
      </div>
      <div id="subList"></div>
    </div>
  </div>

  <!-- 节点列表 -->
  <div class="card mb-4">
    <div class="card-header">📊 节点列表</div>
    <div class="card-body p-0">
      <div class="table-container">
        <table class="table table-hover node-table mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>名称</th>
              <th>协议</th>
              <th>地址</th>
              <th>端口</th>
              <th>传输</th>
              <th>TLS</th>
              <th>来源</th>
            </tr>
          </thead>
          <tbody id="nodeTable"></tbody>
        </table>
      </div>
      <div id="noNodes" class="text-center py-4 text-muted" style="display:none">
        暂无节点，请添加订阅并刷新
      </div>
    </div>
  </div>

  <!-- 日志 -->
  <div class="card mb-4">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span>📝 运行日志</span>
      <button class="btn btn-sm btn-outline-secondary" onclick="fetchLogs()">刷新</button>
    </div>
    <div class="card-body p-3">
      <div class="log-box" id="logBox">等待日志...</div>
    </div>
  </div>

</div>

<script>
const API_BASE = '';
let apiKey = localStorage.getItem('subconv-key') || '';

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  if (!apiKey) { showLogin(); } else { init(); }
});

function showLogin() {
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('mainContent').style.display = 'none';
  setTimeout(() => document.getElementById('apiKeyInput').focus(), 100);
}

function doLogin() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) return;
  apiKey = key;
  // 验证密钥
  api('/api/status').then(() => {
    localStorage.setItem('subconv-key', key);
    document.getElementById('loginOverlay').style.display = 'none';
    init();
  }).catch(() => {
    alert('API密钥无效');
    apiKey = '';
  });
}

function logout() {
  localStorage.removeItem('subconv-key');
  apiKey = '';
  showLogin();
}

function init() {
  document.getElementById('mainContent').style.display = 'block';
  updateSubURL();
  fetchStatus();
  fetchNodes();
  fetchConfig();
  fetchLogs();
  // 自动刷新
  setInterval(fetchStatus, 5000);
  setInterval(fetchLogs, 10000);
}

async function api(path, opts = {}) {
  const res = await fetch(API_BASE + path, {
    ...opts,
    headers: { 'X-API-Key': apiKey, 'Content-Type': 'application/json', ...(opts.headers || {}) }
  });
  if (res.status === 401) { logout(); throw new Error('未授权'); }
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.error || res.statusText);
  }
  return res.json();
}

function updateSubURL() {
  const base = location.origin;
  let url = base + '/sub';
  // build query params
  const params = new URLSearchParams();
  if (window._subToken) params.set('token', window._subToken);
  const nameVal = (document.getElementById('configNameInput')?.value || '').trim();
  if (nameVal) params.set('name', nameVal);
  if (params.toString()) url += '?' + params.toString();
  document.getElementById('subURL').textContent = url;
  document.getElementById('subInfo').textContent = '使用此地址在 Clash Verge 中添加远程订阅';
}

function copySubURL() {
  const url = document.getElementById('subURL').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const t = document.getElementById('copyToast');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
  });
}

let _wasUpdating = false;
async function fetchStatus() {
  try {
    const s = await api('/api/status');
    document.getElementById('nodeCount').textContent = s.node_count;
    document.getElementById('lastUpdate').textContent = s.last_update;
    document.getElementById('nextUpdate').textContent = s.next_update;
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    if (s.updating) {
      dot.className = 'status-dot updating';
      txt.textContent = '更新中...';
      _wasUpdating = true;
      // 更新中加速轮询
      if (!_fastPoll) { _fastPoll = setInterval(fetchStatus, 1000); }
    } else {
      dot.className = 'status-dot ok';
      txt.textContent = '就绪';
      if (_wasUpdating) {
        _wasUpdating = false;
        // 更新刚完成，立即刷新节点和日志
        fetchNodes();
        fetchLogs();
      }
      if (_fastPoll) { clearInterval(_fastPoll); _fastPoll = null; }
    }
  } catch(e) {}
}
let _fastPoll = null;

async function fetchNodes() {
  try {
    const nodes = await api('/api/nodes');
    const tbody = document.getElementById('nodeTable');
    const noNodes = document.getElementById('noNodes');
    if (!nodes || nodes.length === 0) {
      tbody.innerHTML = '';
      noNodes.style.display = 'block';
      return;
    }
    noNodes.style.display = 'none';
    tbody.innerHTML = nodes.map((n, i) => `
      <tr>
        <td>${i+1}</td>
        <td title="${esc(n.name)}">${esc(truncate(n.name, 30))}</td>
        <td><span class="badge bg-${protocolColor(n.type)} badge-protocol">${n.type}</span></td>
        <td><code>${esc(n.server)}</code></td>
        <td>${n.port}</td>
        <td>${n.network || 'tcp'}${n.reality ? '+reality' : ''}</td>
        <td>${n.tls ? '✅' : '—'}</td>
        <td>${esc(n.source || '-')}</td>
      </tr>
    `).join('');
  } catch(e) {}
}

async function fetchConfig() {
  try {
    const data = await api('/api/config');
    const cfg = data.config;
    renderSubList(cfg.subscriptions || []);
    document.getElementById('subCount').textContent = (cfg.subscriptions || []).length;
    // 配置名称
    const nameInput = document.getElementById('configNameInput');
    if (nameInput && !nameInput._userEdited) {
      nameInput.value = cfg['config-name'] || 'SubConv';
    }
    // 令牌
    window._subToken = cfg['sub-token'] || '';
    updateSubURL();
  } catch(e) {}
}

let _subs = [];

function renderSubList(subs) {
  _subs = subs || [];
  const el = document.getElementById('subList');
  if (_subs.length === 0) {
    el.innerHTML = '<div class="text-muted text-center py-2">暂无订阅，请在上方添加</div>';
    return;
  }
  el.innerHTML = _subs.map((s, i) => `
    <div class="d-flex align-items-center justify-content-between py-2 border-bottom">
      <div class="flex-grow-1 me-3">
        <strong>${esc(s.name)}</strong>
        <div class="text-muted small text-truncate" style="max-width:500px">${esc(s.url)}</div>
      </div>
      <button class="btn btn-sm btn-outline-danger" data-del-index="${i}">删除</button>
    </div>
  `).join('');
  // 事件委托
  el.querySelectorAll('[data-del-index]').forEach(btn => {
    btn.addEventListener('click', () => deleteSub(parseInt(btn.dataset.delIndex)));
  });
}

async function addSub() {
  const url = document.getElementById('newSubURL').value.trim();
  const name = document.getElementById('newSubName').value.trim();
  if (!url) { alert('请输入订阅地址'); return; }
  try {
    await api('/api/subscriptions', {
      method: 'POST',
      body: JSON.stringify({ url, name })
    });
    document.getElementById('newSubURL').value = '';
    document.getElementById('newSubName').value = '';
    fetchConfig();
    // 添加后自动刷新节点
    await refreshAll();
  } catch(e) { alert('添加失败: ' + e.message); }
}

async function deleteSub(index) {
  const sub = _subs[index];
  if (!sub) return;
  if (!confirm('确定删除订阅「' + sub.name + '」？')) return;
  try {
    await api('/api/subscriptions/delete', {
      method: 'POST',
      body: JSON.stringify({ url: sub.url })
    });
    await fetchConfig();
    await refreshAll();
  } catch(e) { alert('删除失败: ' + e.message); }
}

async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 更新中...';
  try {
    await api('/api/refresh', { method: 'POST' });
    // 轮询等待更新完成
    await waitForUpdate();
    fetchStatus();
    fetchNodes();
    fetchLogs();
  } catch(e) {
    alert('刷新失败: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '🔄 全部刷新';
  }
}

async function waitForUpdate() {
  for (let i = 0; i < 30; i++) {
    await new Promise(r => setTimeout(r, 1000));
    try {
      const s = await api('/api/status');
      if (!s.updating) return;
    } catch(e) { return; }
  }
}

async function fetchLogs() {
  try {
    const logs = await api('/api/logs');
    const box = document.getElementById('logBox');
    if (!logs || logs.length === 0) {
      box.innerHTML = '<span class="text-muted">暂无日志</span>';
      return;
    }
    box.innerHTML = logs.map(l => {
      const [time, ...rest] = l.split(' ');
      return `<div><span class="log-time">${esc(time)}</span> ${esc(rest.join(' '))}</div>`;
    }).join('');
    box.scrollTop = box.scrollHeight;
  } catch(e) {}
}

async function saveConfigName() {
  const name = document.getElementById('configNameInput').value.trim();
  try {
    await api('/api/config', {
      method: 'POST',
      body: JSON.stringify({ config_name: name })
    });
    document.getElementById('configNameInput')._userEdited = false;
    updateSubURL();
    const t = document.getElementById('copyToast');
    t.querySelector('.alert').textContent = '✅ 配置名称已保存';
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; t.querySelector('.alert').textContent = '✅ 已复制到剪贴板'; }, 2000);
  } catch(e) { alert('保存失败: ' + e.message); }
}

// 标记用户编辑过
document.addEventListener('input', e => {
  if (e.target.id === 'configNameInput') e.target._userEdited = true;
});

function protocolColor(type) {
  const colors = { vless:'primary', vmess:'info', ss:'warning', trojan:'danger', hysteria2:'success' };
  return colors[type] || 'secondary';
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function truncate(s, n) {
  if (!s) return s;
  const chars = [...s];
  return chars.length > n ? chars.slice(0, n).join('') + '...' : s;
}
</script>
</body>
</html>
